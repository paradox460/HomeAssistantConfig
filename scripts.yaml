play_xbox_script:
  alias: Play Xbox Script
  sequence:
  - parallel:
    - if:
      - condition: state
        entity_id: light.theater_floor_lamps
        state: 'off'
      then:
      - type: turn_on
        device_id: ae78864a7dc874b6ad71a0df69c2ecb9
        entity_id: f7534391d26bbf638ba4efbc15e2310c
        domain: light
    - metadata: {}
      data:
        option: Play Xbox
      action: select.select_option
    - action: switch.turn_on
      metadata: {}
      target:
        entity_id: switch.xbox
      data: {}
  - if:
    - condition: template
      value_template: '{{ game is defined }}'
    then:
    - if:
      - condition: state
        entity_id: media_player.xbox
        state: 'off'
      then:
      - wait_for_trigger:
        - entity_id:
          - media_player.xbox
          to: 'on'
          for:
            hours: 0
            minutes: 0
            seconds: 0
          trigger: state
    - target:
        entity_id: media_player.xbox
      data:
        media:
          media_content_id: '{{ game }}'
          media_content_type: ''
          metadata: {}
      action: media_player.play_media
  mode: single
  icon: mdi:microsoft-xbox
